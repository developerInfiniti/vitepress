name: Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run docs:build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Start local server
        run: |
          npx serve docs/.vitepress/dist -l 4175 &
          sleep 3

      - name: Check links
        run: npx linkinator http://localhost:4175 --recurse --config .linkinator.config.json 2>&1 | tee link-report.txt
        continue-on-error: true

      - name: Upload link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: link-report.txt
          retention-days: 30
